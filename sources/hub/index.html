<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Hub</title>
  <style>
    :root {
      --bg-1: #0f1b2b;
      --bg-2: #17365c;
      --card: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.24);
      --text: #f7fbff;
      --muted: #c4d8ee;
      --btn: #8fd3ff;
      --btn-text: #07233b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(90vw 60vh at 95% 10%, #2a5b96 0%, rgba(42, 91, 150, 0) 70%),
        radial-gradient(70vw 50vh at 0% 100%, #214975 0%, rgba(33, 73, 117, 0) 70%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      font-family: "Fira Sans", "Helvetica Neue", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(900px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      padding: 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }

    .app-link {
      display: block;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 700;
      color: var(--btn-text);
      background: var(--btn);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .app-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      border-color: #ffffffa8;
    }

    .hint {
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    code {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 6px;
      padding: 1px 6px;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>VM Service Hub</h1>
    <p>Central entry page for all apps behind Traefik.</p>
    <section class="grid" id="apps"></section>
    <div class="hint">Edit <code>sources/hub/apps.js</code> to add or remove buttons.</div>
  </main>

  <script src="/apps.js"></script>
  <script>
    const container = document.getElementById('apps');
    const apps = Array.isArray(window.HUB_APPS) ? window.HUB_APPS : [];

    apps.forEach((app) => {
      if (!app || !app.name || !app.href) return;
      const a = document.createElement('a');
      a.className = 'app-link';
      a.href = app.href;
      a.textContent = app.name;
      container.appendChild(a);
    });
  </script>
</body>
</html>
